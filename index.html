<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mara and Tomas — ten thousand years of watching</title>
<meta name="description" content="A walk through ten thousand years of watching: who watches, what is fenced, what is theirs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar" role="navigation" aria-label="Timeline overview">
  <div class="brand">
    <span class="brand-title">Mara <span class="amp">&amp;</span> Tomas</span>
    <span class="brand-sub">ten thousand years of watching</span>
  </div>
  <nav class="minimap" id="minimap" aria-label="Stops"></nav>
  <div class="topbar-tools">
    <button id="themeToggle" class="tool-btn" aria-pressed="false" title="Switch to dark variant">
      <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M13.6 11.2A6 6 0 0 1 8 3.1 7 7 0 1 0 16.9 12a6 6 0 0 1-3.3-.8z" fill="currentColor"/></svg>
      <span class="tool-label">Dark</span>
    </button>
  </div>
</header>

<!-- Fixed background stage: ground texture, prop art, and the walking
     figures for whichever stop is current. Never scrolls; contents are
     swapped by app.js when the current stop changes. Sits behind the
     text panel (lower z-index). -->
<div class="stage" id="stage" aria-hidden="true">
  <div class="prop-layer far" id="propFar"></div>
  <div class="prop-layer near" id="propNear"></div>
  <p class="final-question" id="finalQuestion" hidden>no ground line ahead of them</p>
  <div class="ground" id="ground"></div>
  <div class="figures-layer">
    <div class="figures" id="figures"></div>
  </div>
</div>

<!-- The one scrollable element: the current stop's story text and
     ledger. Fixed to the viewport (not part of the stage), so reading
     a long stop never moves the background behind it. -->
<main class="reader" id="reader" tabindex="0" aria-live="polite">
  <!-- current stop injected by app.js -->
</main>

<nav class="stop-nav" aria-label="Move between stops">
  <button id="prevBtn" class="nav-btn" type="button" aria-label="Previous stop">
    <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M12.5 4 6 10l6.5 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Previous</span>
  </button>
  <span class="stop-nav-pos" id="stopPos" aria-hidden="true"></span>
  <button id="nextBtn" class="nav-btn" type="button" aria-label="Next stop">
    <span>Next</span>
    <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M7.5 4 14 10l-6.5 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</nav>

<div class="progress" id="progress"></div>

<script src="js/data.js"></script>
<script src="js/props.js"></script>
<script src="js/figures.js"></script>
<script src="js/app.js"></script>
</body>
</html>
